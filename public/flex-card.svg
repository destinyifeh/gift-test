<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background with Gradient -->
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Card Shape -->
  <rect x="50" y="50" width="700" height="400" rx="30" fill="url(#cardGradient)" filter="url(#shadow)"/>

  <!-- Logo Icon next to Gifthance (no background) -->
  <g transform="translate(100, 90)">
    <!-- Gift box icon - outline style -->
    <g stroke="white" stroke-width="2.2" fill="none">
      <rect x="8" y="20" width="28" height="18" rx="2"/>
      <rect x="5" y="12" width="34" height="10" rx="2"/>
      <line x1="22" y1="12" x2="22" y2="38"/>
      <path d="M22 12c-3-5-10-5-10 0s7 0 10 0"/>
      <path d="M22 12c3-5 10-5 10 0s-7 0-10 0"/>
    </g>
  </g>

  <!-- Gifthance Text -->
  <text x="155" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="white">Gifthance</text>

  <!-- FLEX CARD Subtitle -->
  <text x="155" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="white" fill-opacity="0.8" letter-spacing="2">FLEX CARD</text>

  <!-- ACTIVE Badge -->
  <rect x="580" y="95" width="120" height="40" rx="20" fill="white" fill-opacity="0.25"/>
  <text x="640" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">ACTIVE</text>

  <!-- AVAILABLE BALANCE Label -->
  <text x="100" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="white" fill-opacity="0.7" letter-spacing="1">AVAILABLE BALANCE</text>

  <!-- Balance Amount -->
  <text x="100" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">&#8358;3,000</text>

  <!-- Card Number -->
  <text x="100" y="400" font-family="monospace" font-size="22" font-weight="600" fill="white" fill-opacity="0.9" letter-spacing="2">FLEX-&#x2022;&#x2022;&#x2022;&#x2022;XSPV</text>

  <!-- Tap to flip -->
  <text x="610" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="white" fill-opacity="0.6">Tap to flip</text>

  <!-- Flip icon (circular arrow) -->
  <g transform="translate(700, 385)" stroke="white" stroke-opacity="0.6" stroke-width="1.5" fill="none">
    <path d="M0 6a6 6 0 1 1 1.5 4"/>
    <path d="M0 3v4h4"/>
  </g>
</svg>
