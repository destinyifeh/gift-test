services:
  postgres:
    image: postgres:15-alpine
    container_name: gifthance_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gifthance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gifthance_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-gifthance}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gifthance}"]
      interval: 5s
      timeout: 5s
      retries: 5

